name: Build Static Page from bm.md

on:
  schedule:
    - cron: '*/30 * * * *'   # Every 30 minutes
  workflow_dispatch:

permissions:
  contents: write   # REQUIRED to push generated HTML

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bm.py (generate HTML)
        run: |
          python bm.py

      # If bm.py outputs bm.html, rename it to index.html
      - name: Ensure index.html exists
        run: |
          if [ -f bm.html ]; then
            mv bm.html index.html
          fi

      - name: Commit and push generated page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add index.html
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update static page"
            git push
          else
            echo "No changes to commit"
          fi
